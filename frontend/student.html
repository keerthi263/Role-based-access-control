<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Student Portal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="topbar">
  <h2>Student Portal</h2>
  <div>
    <span id="userInfo"></span>
    <button class="btn-primary" onclick="location.href='dashboard.html'" style="margin-right:8px">Dashboard</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container" style="margin-top:36px;">
  <div id="msg" class="msg" style="display:none"></div>

  <div class="form-box">
    <h3 id="formTitle">Add Student</h3>
    <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Full name"/></div>
    <div class="form-group"><label>Age *</label><input type="number" id="age" placeholder="Age"/></div>
    <div class="form-group"><label>Gender</label>
      <select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
    </div>
    <div class="form-group"><label>Department *</label><input type="text" id="department" placeholder="e.g. Computer Science"/></div>
    <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="email@example.com"/></div>
    <div class="form-group"><label>Course</label><input type="text" id="course" placeholder="e.g. B.Tech"/></div>
    <div class="form-group"><label>Year</label><input type="text" id="year" placeholder="e.g. 1st Year"/></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="save()">Save</button>
      <button class="btn-warning" onclick="resetForm()" id="cancelBtn" style="display:none">Cancel</button>
    </div>
  </div>

  <div class="table-box">
    <h3>Student Records</h3>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name or email..." oninput="renderTable()"/>
    </div>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Age</th><th>Gender</th><th>Department</th><th>Email</th><th>Course</th><th>Year</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  document.getElementById('userInfo').textContent = localStorage.getItem('username') + ' (' + localStorage.getItem('role') + ')';
  if (!localStorage.getItem('role')) window.location.href = 'login.html';

  let students = [], editId = null;

  async function load() {
    const res = await fetch('http://localhost:8000/students');
    students = await res.json();
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = students.filter(s =>
      s.name.toLowerCase().includes(q) || s.email.toLowerCase().includes(q)
    );
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = filtered.map((s, i) => `
      <tr>
        <td>${i+1}</td><td>${s.name}</td><td>${s.age}</td><td>${s.gender}</td>
        <td>${s.department}</td><td>${s.email}</td><td>${s.course}</td><td>${s.year}</td>
        <td class="actions">
          <button class="btn-warning" onclick="editRow(${s.id})">Edit</button>
          <button class="btn-danger" onclick="del(${s.id})">Delete</button>
        </td>
      </tr>`).join('');
  }

  async function save() {
    const body = {
      name: document.getElementById('name').value,
      age: document.getElementById('age').value,
      gender: document.getElementById('gender').value,
      department: document.getElementById('department').value,
      email: document.getElementById('email').value,
      course: document.getElementById('course').value,
      year: document.getElementById('year').value
    };
    if (!body.name || !body.age || !body.department || !body.email) { showMsg('Please fill required fields.', 'error'); return; }
    if (editId) {
      await fetch('http://localhost:8000/students/' + editId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      showMsg('Student updated!', 'success');
    } else {
      await fetch('http://localhost:8000/students', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      showMsg('Student added!', 'success');
    }
    resetForm(); load();
  }

  function editRow(id) {
    const s = students.find(x => x.id === id);
    editId = id;
    document.getElementById('name').value = s.name;
    document.getElementById('age').value = s.age;
    document.getElementById('gender').value = s.gender;
    document.getElementById('department').value = s.department;
    document.getElementById('email').value = s.email;
    document.getElementById('course').value = s.course;
    document.getElementById('year').value = s.year;
    document.getElementById('formTitle').textContent = 'Edit Student';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    window.scrollTo({top: 0});
  }

  async function del(id) {
    if (!confirm('Delete this student?')) return;
    await fetch('http://localhost:8000/students/' + id, { method: 'DELETE' });
    showMsg('Student deleted.', 'success'); load();
  }

  function resetForm() {
    editId = null;
    ['name','age','department','email','course','year'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('gender').value = '';
    document.getElementById('formTitle').textContent = 'Add Student';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  load();
</script>
</body>
</html>
