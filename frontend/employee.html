<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Employee Portal</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div class="topbar">
  <h2>Employee Portal</h2>
  <div>
    <span id="userInfo"></span>
    <button class="btn-primary" onclick="location.href='dashboard.html'" style="margin-right:8px">Dashboard</button>
    <button class="btn-logout" onclick="logout()">Logout</button>
  </div>
</div>

<div class="container" style="margin-top:36px;">
  <div id="msg" class="msg" style="display:none"></div>

  <div class="form-box">
    <h3 id="formTitle">Add Employee</h3>
    <div class="form-group"><label>Full Name *</label><input type="text" id="name" placeholder="Full name"/></div>
    <div class="form-group"><label>Age *</label><input type="number" id="age" placeholder="Age"/></div>
    <div class="form-group"><label>Gender</label>
      <select id="gender"><option value="">Select</option><option>Male</option><option>Female</option><option>Other</option></select>
    </div>
    <div class="form-group"><label>Department *</label><input type="text" id="department" placeholder="e.g. HR, IT"/></div>
    <div class="form-group"><label>Email *</label><input type="email" id="email" placeholder="email@example.com"/></div>
    <div class="form-group"><label>Salary *</label><input type="number" id="salary" placeholder="Monthly salary"/></div>
    <div class="form-group"><label>Phone</label><input type="text" id="phone" placeholder="Phone number"/></div>
    <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="Address"/></div>
    <div class="form-actions">
      <button class="btn-primary" onclick="save()">Save</button>
      <button class="btn-warning" onclick="resetForm()" id="cancelBtn" style="display:none">Cancel</button>
    </div>
  </div>

  <div class="table-box">
    <h3>Employee Records</h3>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Search by name or email..." oninput="renderTable()"/>
    </div>
    <table>
      <thead><tr><th>#</th><th>Name</th><th>Age</th><th>Gender</th><th>Department</th><th>Email</th><th>Phone</th><th>Salary</th><th>Actions</th></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<script>
  document.getElementById('userInfo').textContent = localStorage.getItem('username') + ' (' + localStorage.getItem('role') + ')';
  const role = localStorage.getItem('role');
  if (!role || role === 'student') window.location.href = 'dashboard.html';

  let employees = [], editId = null;

  async function load() {
    const res = await fetch('http://localhost:8000/employees');
    employees = await res.json();
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = employees.filter(e =>
      e.name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q)
    );
    document.getElementById('tbody').innerHTML = filtered.map((e, i) => `
      <tr>
        <td>${i+1}</td><td>${e.name}</td><td>${e.age}</td><td>${e.gender}</td>
        <td>${e.department}</td><td>${e.email}</td><td>${e.phone}</td><td>${e.salary}</td>
        <td class="actions">
          <button class="btn-warning" onclick="editRow(${e.id})">Edit</button>
          <button class="btn-danger" onclick="del(${e.id})">Delete</button>
        </td>
      </tr>`).join('');
  }

  async function save() {
    const body = {
      name: document.getElementById('name').value,
      age: document.getElementById('age').value,
      gender: document.getElementById('gender').value,
      department: document.getElementById('department').value,
      email: document.getElementById('email').value,
      salary: document.getElementById('salary').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value
    };
    if (!body.name || !body.age || !body.department || !body.email || !body.salary) {
      showMsg('Please fill required fields.', 'error'); return;
    }
    if (editId) {
      await fetch('http://localhost:8000/employees/' + editId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      showMsg('Employee updated!', 'success');
    } else {
      await fetch('http://localhost:8000/employees', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      showMsg('Employee added!', 'success');
    }
    resetForm(); load();
  }

  function editRow(id) {
    const e = employees.find(x => x.id === id);
    editId = id;
    document.getElementById('name').value = e.name;
    document.getElementById('age').value = e.age;
    document.getElementById('gender').value = e.gender;
    document.getElementById('department').value = e.department;
    document.getElementById('email').value = e.email;
    document.getElementById('salary').value = e.salary;
    document.getElementById('phone').value = e.phone;
    document.getElementById('address').value = e.address;
    document.getElementById('formTitle').textContent = 'Edit Employee';
    document.getElementById('cancelBtn').style.display = 'inline-block';
    window.scrollTo({top: 0});
  }

  async function del(id) {
    if (!confirm('Delete this employee?')) return;
    await fetch('http://localhost:8000/employees/' + id, { method: 'DELETE' });
    showMsg('Employee deleted.', 'success'); load();
  }

  function resetForm() {
    editId = null;
    ['name','age','department','email','salary','phone','address'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('gender').value = '';
    document.getElementById('formTitle').textContent = 'Add Employee';
    document.getElementById('cancelBtn').style.display = 'none';
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text; el.className = 'msg ' + type; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3000);
  }

  function logout() { localStorage.clear(); window.location.href = 'login.html'; }

  load();
</script>
</body>
</html>
